<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #0d47a1;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 2px dashed #2196f3;
            padding: 40px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            background: #f5fbff;
        }

        .upload-box:hover {
            background: #e3f2fd;
        }

        input[type="file"] {
            display: none;
        }

        .upload-text {
            color: #555;
        }

        .preview {
            margin-top: 20px;
        }

        .preview img {
            width: 200px;
            border-radius: 10px;
        }

        button {
            margin-top: 20px;
            background: #1565c0;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0d47a1;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            background: #e8f5e9;
        }

        .result h2 {
            color: #2e7d32;
        }

        .confidence {
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
.upload-box {
    border: 2px dashed #2196f3;
    padding: 40px;
    border-radius: 12px;
    cursor: pointer;
    background: #f5fbff;
    transition: 0.3s;
    width: 70%;
    margin: auto;
}

.upload-box:hover {
    background: #e3f2fd;
}

.upload-box.dragover {
    border-color: #0d47a1;
    background: #e3f2fd;
}

input[type="file"] {
    display: none;
}
    </style>
</head>

<body>

<div class="container">
    <h1>🧠 Brain Tumor Detection</h1>

    <form method="POST" enctype="multipart/form-data">
        
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <input type="file" name="file" id="fileInput" required onchange="previewImage(event)">
        
        <div id="upload-content">
            <p style="font-size:18px;">📁 <b>Click to Upload MRI</b></p>
            <p style="color:gray;">or drag and drop image here</p>
        </div>
    </div>
        <div class="preview" id="preview"></div>

        <button type="submit">🔍 Predict</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h2>Prediction: {{ prediction }}</h2>
        <p class="confidence">Confidence: {{ confidence }}%</p>
        <p>{{ feedback }}</p>
        <img src="{{ image }}" width="220">
    </div>
    {% endif %}

    <div class="footer">
        ⚠️ This tool is for research/demo purposes only. Consult a medical professional.
    </div>
</div>

<script>
const uploadBox = document.querySelector('.upload-box');
const fileInput = document.getElementById('fileInput');

uploadBox.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadBox.classList.add('dragover');
});

uploadBox.addEventListener('dragleave', () => {
    uploadBox.classList.remove('dragover');
});

uploadBox.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadBox.classList.remove('dragover');

    const file = e.dataTransfer.files[0];
    fileInput.files = e.dataTransfer.files;

    previewImage({ target: { files: [file] } });
});
function previewImage(event) {
    const preview = document.getElementById('preview');
    preview.innerHTML = "";

    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function() {
        const img = document.createElement('img');
        img.src = reader.result;
        preview.appendChild(img);
    }

    if(file){
        reader.readAsDataURL(file);
    }
}
</script>

</body>
</html>
